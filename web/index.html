<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Renderit — 3D Model Viewer</title>
  </head>
  <body>
    <div id="app">
      <main id="viewport-region">
        <canvas id="viewer-canvas"></canvas>
        <div id="import-overlay">
          <p>Drag and drop a 3D model, zip, or folder here</p>
          <button id="browse-button" type="button">Browse files</button>
          <button id="browse-folder-button" type="button">Browse folder</button>
          <input
            id="file-input"
            type="file"
            accept=".gltf,.glb,.obj,.mtl,.fbx,.stl,.dae,.zip"
            multiple
            hidden
          />
          <input id="folder-input" type="file" webkitdirectory multiple hidden />
        </div>
        <p id="import-error" role="alert" hidden></p>
      </main>
      <aside id="sidebar-region">
        <h1 class="brand">Renderit</h1>
        <section id="settings-panel">
          <h2>Settings</h2>
          <button id="reset-view-button" type="button">Reset view</button>
        </section>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
